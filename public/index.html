<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeudaTrack — Gestión de Deudas Grupales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="app">
    <!-- Home Screen -->
    <div id="screen-home" class="screen active">
      <div class="home-bg"></div>
      <header class="home-header">
        <div class="logo">
          <span class="logo-icon">⬡</span>
          <span class="logo-text">DeudaTrack</span>
        </div>
        <p class="logo-sub">Gestiona deudas con familia, amigos y más</p>
      </header>

      <main class="home-main">
        <div class="home-actions">
          <button class="btn-primary btn-xl" onclick="App.showCreateGroup()">
            <span class="btn-icon">+</span>
            Crear Grupo
          </button>
          <button class="btn-ghost btn-xl" onclick="App.showJoinGroup()">
            <span class="btn-icon">→</span>
            Unirme con Código
          </button>
        </div>

        <div id="groups-list" class="groups-grid"></div>
      </main>
    </div>

    <!-- Group Screen -->
    <div id="screen-group" class="screen">
      <header class="group-header">
        <button class="back-btn" onclick="App.goHome()">← Grupos</button>
        <div class="group-header-info">
          <h1 id="group-title"></h1>
          <div class="group-meta">
            <span id="group-type-badge" class="type-badge"></span>
            <span id="group-code" class="code-badge"></span>
          </div>
        </div>
        <div class="header-actions">
          <button class="btn-sm btn-outline" onclick="App.openAddMember()">+ Miembro</button>
          <button class="btn-sm btn-primary" onclick="App.openAddDebt()">+ Deuda</button>
        </div>
      </header>

      <nav class="tab-nav">
        <button class="tab-btn active" data-tab="resumen" onclick="App.switchTab('resumen')">Resumen</button>
        <button class="tab-btn" data-tab="deudas" onclick="App.switchTab('deudas')">Deudas</button>
        <button class="tab-btn" data-tab="miembros" onclick="App.switchTab('miembros')">Miembros</button>
      </nav>

      <main class="group-main">
        <!-- RESUMEN TAB -->
        <div id="tab-resumen" class="tab-content active">
          <div id="summary-cards" class="summary-grid"></div>
          <div id="balance-chart" class="balance-section"></div>
        </div>

        <!-- DEUDAS TAB -->
        <div id="tab-deudas" class="tab-content">
          <div class="filter-bar">
            <select id="filter-status" onchange="App.filterDebts()">
              <option value="all">Todas</option>
              <option value="pendiente">Pendientes</option>
              <option value="parcial">Parciales</option>
              <option value="pagada">Pagadas</option>
            </select>
            <select id="filter-member" onchange="App.filterDebts()">
              <option value="all">Todos los miembros</option>
            </select>
          </div>
          <div id="debts-list" class="debts-list"></div>
        </div>

        <!-- MIEMBROS TAB -->
        <div id="tab-miembros" class="tab-content">
          <div id="members-list" class="members-list"></div>
        </div>
      </main>
    </div>
  </div>

  <!-- MODALS -->
  <div id="modal-overlay" class="modal-overlay" onclick="App.closeModal()">
    <div id="modal-box" class="modal-box" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="App.closeModal()">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <script src="/js/app.js"></script>
</body>
</html>
